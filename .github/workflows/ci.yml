name: Quality Gate
on: [push, pull_request]
jobs:
  node-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test --if-present
      # Try lint if script exists, otherwise skip
      - run: npm run lint --if-present

